apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: nose
spec:
  workspaces:
  - name: output

  params:
  - name: args
    default: -v

  steps:
  - name: nosetests
    image: python:3.9-slim
    workingDir: $(workspaces.output.path)
    script: |
      set -e

      echo "WORKDIR CHECK:"
      pwd
      ls -la

      echo "SEARCHING FOR REQUIREMENTS:"
      find . -name requirements.txt

      REQ=$(find . -name requirements.txt | head -n 1)

      if [ -z "$REQ" ]; then
        echo "ERROR: requirements.txt not found in workspace"
        exit 1
      fi

      python -m pip install --upgrade pip wheel

      pip install -r "$REQ"

      nosetests $(params.args)

      