apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: nose
spec:
  params:
    - name: args
      type: string
      default: -v

  workspaces:
    - name: output   # 👈 THIS is the key fix

  steps:
    - name: nosetests
      image: python:3.9-slim
      workingDir: $(workspaces.output.path)
      script: |
        set -e
        ls -la
        python -m pip install --upgrade pip wheel
        pip install -r requirements.txt
        nosetests $(params.args)

        